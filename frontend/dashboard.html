<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FastAPI Social</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <h1 class="logo">FastAPI Social</h1>
      <div class="header-right">
        <span class="user-email" id="user-email"></span>
        <button class="btn btn-outline btn-sm" id="logout-btn">Logout</button>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="toolbar">
      <div class="search-wrapper">
        <input type="text" id="search-input" placeholder="Search posts..." class="search-input">
      </div>
      <button class="btn btn-primary" id="new-post-btn">+ New Post</button>
    </div>

    <div class="loading" id="loading">Loading posts...</div>
    <div class="error-banner" id="error-banner"></div>

    <div class="posts-grid" id="posts-grid"></div>

    <div class="pagination" id="pagination"></div>
  </main>

  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">New Post</h2>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <form id="post-form">
        <div class="form-group">
          <label for="post-title">Title</label>
          <input type="text" id="post-title" required>
        </div>
        <div class="form-group">
          <label for="post-content">Content</label>
          <textarea id="post-content" rows="5" required></textarea>
        </div>
        <div class="form-group checkbox-group">
          <label>
            <input type="checkbox" id="post-published" checked>
            Published
          </label>
        </div>
        <div class="form-error" id="post-error"></div>
        <div class="modal-actions">
          <button type="button" class="btn btn-outline" id="modal-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary" id="modal-submit">Create Post</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay hidden" id="delete-overlay">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2>Delete Post</h2>
        <button class="modal-close" id="delete-close">&times;</button>
      </div>
      <p>Are you sure you want to delete this post? This action cannot be undone.</p>
      <div class="form-error" id="delete-error"></div>
      <div class="modal-actions">
        <button class="btn btn-outline" id="delete-cancel">Cancel</button>
        <button class="btn btn-danger" id="delete-confirm">Delete</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
