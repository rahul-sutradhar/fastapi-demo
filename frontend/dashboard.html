<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Picto</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <h1 class="logo">Picto</h1>
      <div class="header-icons">
        <button class="icon-btn" id="search-toggle" title="Search">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </button>
        <button class="icon-btn" id="new-post-btn" title="New Post">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
          </svg>
        </button>
        <div class="avatar-dropdown">
          <button class="avatar-btn" id="avatar-btn">
            <div class="avatar avatar-sm" id="header-avatar">U</div>
          </button>
          <div class="dropdown-menu hidden" id="dropdown-menu">
            <div class="dropdown-header" id="dropdown-user">user@example.com</div>
            <button class="dropdown-item" id="profile-btn">Profile</button>
            <div class="dropdown-divider"></div>
            <button class="dropdown-item danger" id="logout-btn">Logout</button>
          </div>
        </div>
      </div>
    </div>
    <div class="search-bar hidden" id="search-bar">
      <input type="text" id="search-input" placeholder="Search Picto" class="search-input">
    </div>
  </header>

  <main class="feed-container">
    <div class="loading" id="loading">
      <div class="spinner"></div>
    </div>
    <div class="error-banner hidden" id="error-banner"></div>
    <div class="feed" id="feed"></div>
    <div class="feed-end" id="feed-end"></div>
  </main>

  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <button class="modal-back" id="modal-back">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <h2 id="modal-title">New Post</h2>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <form id="post-form">
        <div class="form-group">
          <input type="text" id="post-title" placeholder="Title" required>
        </div>
        <div class="form-group">
          <textarea id="post-content" rows="5" placeholder="Write a caption..." required></textarea>
        </div>
        <div class="form-group image-upload-area">
          <button type="button" class="btn btn-outline btn-sm" id="media-upload-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
            Add Photo / Video
          </button>
          <span class="media-count" id="media-count"></span>
          <input type="file" id="media-input" accept="image/*,video/*" multiple hidden>
          <div class="media-preview-grid hidden" id="media-preview-grid"></div>
          <div class="upload-status hidden" id="upload-status">Uploading...</div>
          <button type="button" class="image-remove-btn hidden" id="media-remove-btn">Remove all</button>
        </div>
        <div class="form-group checkbox-group">
          <label>
            <input type="checkbox" id="post-published" checked>
            Published
          </label>
        </div>
        <div class="form-error" id="post-error"></div>
        <div class="modal-actions">
          <button type="submit" class="btn btn-primary btn-full" id="modal-submit">Share</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay hidden" id="delete-overlay">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2>Delete Post</h2>
        <button class="modal-close" id="delete-close">&times;</button>
      </div>
      <p class="delete-text">Are you sure you want to delete this post?</p>
      <div class="form-error" id="delete-error"></div>
      <div class="modal-actions">
        <button class="btn btn-outline btn-full" id="delete-cancel">Cancel</button>
        <button class="btn btn-danger btn-full" id="delete-confirm">Delete</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay hidden" id="profile-overlay">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2>Profile</h2>
        <button class="modal-close" id="profile-close">&times;</button>
      </div>
      <div class="profile-card">
        <div class="profile-avatar">
          <div class="avatar avatar-lg" id="profile-avatar">U</div>
        </div>
        <div class="profile-email" id="profile-email">user@example.com</div>
        <div class="profile-stats">
          <div class="stat">
            <span class="stat-value" id="profile-post-count">0</span>
            <span class="stat-label">posts</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="profile-like-count">0</span>
            <span class="stat-label">likes</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
